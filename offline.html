<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — NOIR INK STUDIO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      color: #E0E0E0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 480px; }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.5;
    }
    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    p {
      color: #888;
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      color: #FFFFFF;
      border: 1px solid #2A2A2A;
      padding: 0.75rem 2rem;
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: background 250ms ease;
    }
    a:hover { background: #1A1A1A; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚡</div>
    <h1>You're Offline</h1>
    <p>
      It looks like your connection dropped. Don't worry — your recent
      interactions are saved locally and will sync when you're back online.
    </p>
    <a href="/">Try Again</a>
  </div>
</body>
</html>
